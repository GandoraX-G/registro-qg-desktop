name: build-windows-exe

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installa Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Installa dipendenze npm
        run: npm ci

      - name: Installa Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Compila l'app Windows
        run: cargo tauri build

      - name: Carica l'installer come artifact scaricabile
        uses: actions/upload-artifact@v4
        with:
          name: registro-qg-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Attesta la provenienza dell'artifact
        uses: actions/attest-build-provenance@v2
        continue-on-error: true
        with:
          subject-path: src-tauri/target/release/bundle/nsis/*.exe

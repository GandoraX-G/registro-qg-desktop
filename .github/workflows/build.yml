name: build-windows-exe

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installa Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installa dipendenze npm
        run: npm install

      - name: Installa Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Build Vite frontend
        run: npm run build

      - name: Installa Tauri CLI
        run: cargo install tauri-cli

      - name: Compila l'app Windows
        run: cargo tauri build

      - name: Carica l'installer come artifact scaricabile
        uses: actions/upload-artifact@v4
        with:
          name: registro-qg-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
